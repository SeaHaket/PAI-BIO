<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#080c14" />
  
  <!-- Cyberpunk grid/radar lines -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#122538" stroke-width="2" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1a3550" stroke-width="1" stroke-dasharray="8 8" />
  <line x1="256" y1="36" x2="256" y2="476" stroke="#122538" stroke-width="2" />
  <line x1="36" y1="256" x2="476" y2="256" stroke="#122538" stroke-width="2" />

  <!-- Outer Neon Ring (Volt Yellow and Cyber Cyan) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#cyanVoltGrad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="900" stroke-dashoffset="150" />
  
  <!-- Glowing effects -->
  <defs>
    <linearGradient id="cyanVoltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#dfff00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing Heart/Tachometer Center -->
  <path d="M 256,150 
           C 210,100 130,110 100,165 
           C 70,220 100,285 160,335 
           L 256,415 
           L 352,335 
           C 412,285 442,220 412,165 
           C 382,110 302,100 256,150 Z" 
        fill="none" 
        stroke="url(#cyanVoltGrad)" 
        stroke-width="12" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Tech indicator sweep line (like a speedometer needle) -->
  <line x1="256" y1="256" x2="360" y2="160" stroke="#dfff00" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  <circle cx="256" cy="256" r="16" fill="#080c14" stroke="#dfff00" stroke-width="6" />
</svg>
